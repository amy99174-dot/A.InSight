
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>History Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
   <style>
  body {
    margin: 0;
    background-color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    user-select: none; 
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  /* 波紋動畫 */
  @keyframes ripple-wave {
    0% { width: 0px; height: 0px; opacity: 0.8; border-width: 3px; }
    100% { width: 380px; height: 380px; opacity: 0; border-width: 0px; }
  }
  .animate-ripple {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 9999px;
      border-style: solid;
      border-color: rgba(57, 255, 20, 0.5); /* Neon Green */
      animation: ripple-wave 3s cubic-bezier(0.1, 0.5, 0.9, 1) infinite;
      pointer-events: none;
  }

  /* 慢速旋轉裝飾 */
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .animate-spin-slow {
    animation: spin-slow 10s linear infinite;
  }

  /* --- 修正：更明顯的斷續震動 --- */
  @keyframes intermittent-shake {
    0%, 100% { transform: translate(0, 0); }
    /* 第一波震動 (幅度加大到 3px) */
    2%, 10%, 18% { transform: translate(-3px, 2px); }
    4%, 12%, 20% { transform: translate(3px, -2px); }
    6%, 14%, 22% { transform: translate(-2px, -3px); }
    8%, 16%, 24% { transform: translate(2px, 3px); }
    
    /* 停頓 (平靜期) */
    26%, 60% { transform: translate(0, 0); }

    /* 第二波短震 */
    62%, 66% { transform: translate(2px, 0); }
    64%, 68% { transform: translate(-2px, 0); }
    
    /* 長停頓 */
    70% { transform: translate(0, 0); }
  }
  
  .animate-intermittent-shake {
    animation: intermittent-shake 2s steps(5) infinite; /* 使用 steps 讓震動更有機械頓挫感 */
    width: 100%;
    height: 100%;
    border-radius: 9999px;
    overflow: hidden;
  }

  .bg-noise {
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.1'/%3E%3C/svg%3E");
  }
</style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
